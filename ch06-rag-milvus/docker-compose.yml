x-nat-common: &nat-common
  image: nat-nim-handson:1.6.0
  env_file:
    - .env

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      # Langfuse PoC stack already exposes 127.0.0.1:9091 (MinIO Console).
      # Map Milvus metrics to 9191 instead to avoid the collision.
      - "9191:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  ingest:
    <<: *nat-common
    profiles: ["ingest"]
    entrypoint: ["python", "/app/scripts/ingest_internal_docs.py"]
    volumes:
      - ./scripts:/app/scripts:ro
      - ../datasets:/app/datasets:ro
    depends_on:
      - milvus

  query:
    <<: *nat-common
    profiles: ["query"]
    entrypoint: ["python", "/app/scripts/query_smoke.py"]
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      - milvus

volumes:
  etcd-data:
  minio-data:
  milvus-data:
