colang_version: "1.0"

models:
  - type: main
    engine: nim
    model: nvidia/llama-3.3-nemotron-super-49b-v1
    parameters:
      base_url: https://integrate.api.nvidia.com/v1
      temperature: 0.0

instructions:
  - type: general
    content: |
      あなたはアサヒシステムズ株式会社の社内文書 Q&A アシスタントです。
      日本語で 1〜3 文で簡潔に答えてください。

rails:
  input:
    flows:
      - self check input
  output:
    flows:
      - self check output
